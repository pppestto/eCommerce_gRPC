services:
  postgres:
    image: postgres:15-alpine
    container_name: ecommerce_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ecommerce
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ecommerce_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ecommerce_kafka
    environment:
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      # KRaft mode (без Zookeeper — устраняет NodeExists)
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      start_period: 15s
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ecommerce_kafka_init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic user-events --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic product-events --partitions 1 --replication-factor 1
        kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic order-events --partitions 1 --replication-factor 1
        echo "Topics created"

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: ecommerce_user_service
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/ecommerce?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_USER_TOPIC: user-events
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
    ports:
      - "50051:50051"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  product-service:
    build:
      context: .
      dockerfile: services/product-service/Dockerfile
    container_name: ecommerce_product_service
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/ecommerce?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_PRODUCT_TOPIC: product-events
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
    ports:
      - "50052:50052"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  order-service:
    build:
      context: .
      dockerfile: services/order-service/Dockerfile
    container_name: ecommerce_order_service
    environment:
      DATABASE_URL: postgres://postgres:password@postgres:5432/ecommerce?sslmode=disable
      KAFKA_BROKERS: kafka:9092
      KAFKA_ORDER_TOPIC: order-events
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
    ports:
      - "50053:50053"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully

  bff:
    build:
      context: .
      dockerfile: services/bff/Dockerfile
    container_name: ecommerce_bff
    environment:
      USER_SERVICE_ADDR: user-service:50051
      PRODUCT_SERVICE_ADDR: product-service:50052
      ORDER_SERVICE_ADDR: order-service:50053
      JWT_SECRET: your-256-bit-secret-key-change-in-production
      REDIS_ADDR: redis:6379
      OTEL_EXPORTER_OTLP_ENDPOINT: jaeger:4317
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - product-service
      - order-service
      - redis
      - jaeger

  jaeger:
    image: jaegertracing/all-in-one:1.55
    container_name: ecommerce_jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"

  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: ecommerce_prometheus
    volumes:
      - ./deployments/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    depends_on:
      - bff
      - user-service
      - product-service
      - order-service

volumes:
  postgres_data:
  kafka_data:
